<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="container nav-inner">
    <button class="logo" (click)="scrollTo('hero')">MJ</button>

    <ul class="nav-links" [class.open]="menuOpen()">
      @for (link of links; track link) {
        <li>
          <button
            (click)="scrollTo(link)"
            [class.active]="activeSection() === link">
            {{ link | titlecase }}
          </button>
        </li>
      }
    </ul>

    <div class="nav-actions">
      <button class="theme-toggle" (click)="theme.toggle()" [title]="theme.isDark() ? 'Mode clair' : 'Mode sombre'">
        @if (theme.isDark()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>
