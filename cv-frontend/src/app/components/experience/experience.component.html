<section id="experience" class="section">
  <div class="container">
    <div #animEl class="fade-in">
      <p class="section-label">Mon parcours</p>
      <h2 class="section-title">Expérience</h2>
      <p class="section-subtitle">Les expériences professionnelles qui ont façonné mes compétences.</p>
    </div>

    <div class="timeline">
      @for (exp of experiences; track exp.company; let i = $index) {
        <div #animEl class="fade-in timeline-item" [class.right]="i % 2 === 1" [style.transition-delay]="(i * 0.15) + 's'">
          <div class="timeline-dot"></div>
          <div class="timeline-card">
            <div class="card-header">
              <div>
                <h3 class="card-role">{{ exp.role }}</h3>
                <p class="card-company">{{ exp.company }} · {{ exp.location }}</p>
              </div>
              <span class="card-period">{{ exp.period }}</span>
            </div>
            <ul class="card-bullets">
              @for (b of exp.bullets; track b) {
                <li>{{ b }}</li>
              }
            </ul>
          </div>
        </div>
      }
    </div>
  </div>
</section>
