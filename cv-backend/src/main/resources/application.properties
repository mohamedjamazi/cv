spring.application.name=cv-backend
server.port=${PORT:8080}

# Database — local XAMPP MySQL by default, overridden by env vars in production
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cvdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS — comma-separated list of allowed frontend origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
